<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/>
          <rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/>
          <rect x="18" y="18" width="3" height="3"/>
        </svg>
      </div>
      <h1>QR Generator</h1>
    </div>
  </header>

  <main>
    <div class="card" id="input-card">
      <h2>Create Your QR Code</h2>
      <p class="subtitle">Enter a URL or upload a file — your QR code will link directly to it.</p>

      <!-- URL Input -->
      <div class="section">
        <label for="url-input">
          <span class="label-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
          </span>
          Destination URL
        </label>
        <input
          type="url"
          id="url-input"
          placeholder="https://example.com"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="divider">
        <span>or</span>
      </div>

      <!-- File Upload -->
      <div class="section">
        <label>
          <span class="label-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </span>
          Upload File
        </label>

        <div class="drop-zone" id="drop-zone">
          <div class="drop-zone-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
          </div>
          <p class="drop-zone-text">Drag &amp; drop your file here</p>
          <p class="drop-zone-hint">PDF, images, documents — up to 50 MB</p>
          <button class="btn-secondary" id="browse-btn" type="button">Browse files</button>
          <input type="file" id="file-input" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.png,.jpg,.jpeg,.gif,.mp4,.zip" hidden />
        </div>

        <div class="file-preview" id="file-preview" hidden>
          <div class="file-info">
            <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <span id="file-name"></span>
          </div>
          <button class="btn-remove" id="remove-file" type="button" aria-label="Remove file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-msg" id="error-msg" hidden></div>

      <button class="btn-primary" id="generate-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="17" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/>
        </svg>
        Create Unique QR
      </button>
    </div>

    <!-- QR Result -->
    <div class="card" id="result-card" hidden>
      <h2>Your QR Code</h2>
      <div class="qr-wrapper">
        <div class="qr-container" id="qr-container">
          <img id="qr-image" alt="Generated QR Code" />
        </div>
        <div class="qr-destination">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <span id="qr-url-display"></span>
        </div>
      </div>
      <div class="result-actions">
        <button class="btn-primary" id="download-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download QR
        </button>
        <button class="btn-secondary" id="reset-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4.51"/>
          </svg>
          Create Another
        </button>
      </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay" hidden>
      <div class="spinner"></div>
      <p id="loading-text">Generating QR code...</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
